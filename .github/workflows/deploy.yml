name: Build, Validate & Deploy

on:
  push:
    branches:
      - main

jobs:
  # PARTE 1: VALIDAÇÃO
  validate:
    name: "Stage 1: Validation"
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
      build-success: ${{ steps.build.outcome }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        id: install
        run: npm ci
        continue-on-error: true

      - name: Configure Environment
        run: |
          cat > .env.local << 'EOF'
          NEXT_PUBLIC_SITE_URL=https://geef.com.br
          NEXT_PUBLIC_SUPABASE_URL=https://nycgpokqlmrfzegjlrwa.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=sb_publishable_jDq5SX_k4spHMCCPVvlsrQ_-ZZybt8e
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.GEEF_SUPABASE_SERVICE_ROLE_KEY }}
          EOF

      - name: Lint Check
        id: lint
        run: npm run agent:lint 2>&1 || echo "⚠️ Linting warnings (non-blocking)"
        continue-on-error: true

      - name: Build Project
        id: build
        run: npm run build
        continue-on-error: true

      - name: Save Build Logs
        if: failure()
        run: |
          mkdir -p build-logs
          npm run build 2>&1 | tee build-logs/build-error.log || true

      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build-logs/
          retention-days: 7

      - name: Check Validation Status
        run: |
          echo "📊 Validation Summary:"
          echo "  Install: ${{ steps.install.outcome }}"
          echo "  Lint: ${{ steps.lint.outcome }}"
          echo "  Build: ${{ steps.build.outcome }}"

          if [ "${{ steps.build.outcome }}" != "success" ]; then
            echo "❌ Build validation FAILED"
            echo "📋 Check build-logs artifact for details"
            exit 1
          fi
          echo "✅ Validation PASSED"

  # PARTE 2: PRÉ-DEPLOY (Testes Adicionais)
  pre-deploy-check:
    name: "Stage 2: Pre-Deploy Checks"
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        attempt: [1, 2, 3]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify Build Artifacts
        run: |
          npm ci
          npm run build

          if [ -d ".next" ]; then
            echo "✅ Build artifacts verified"
            du -sh .next/
          else
            echo "❌ Build artifacts missing"
            exit 1
          fi

      - name: Retry on Failure
        if: failure() && matrix.attempt < 3
        run: |
          echo "⚠️ Attempt ${{ matrix.attempt }} failed, retrying..."
          sleep 10

      - name: Final Status
        if: success()
        run: |
          echo "✅ Stage 2: Pre-Deploy checks PASSED"
          echo "Ready for deployment!"

      - name: Fail on Final Attempt
        if: failure() && matrix.attempt == 3
        run: |
          echo "❌ Pre-deploy checks failed after 3 attempts"
          exit 1

  # PARTE 3: DEPLOY
  deploy:
    name: "Stage 3: Production Deploy"
    needs: [validate, pre-deploy-check]
    runs-on: ubuntu-latest
    if: success()
    strategy:
      max-parallel: 1
      matrix:
        attempt: [1, 2, 3]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GEEF_VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.GEEF_VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Show Deployment Target
        env:
          VPS_USER: ${{ secrets.GEEF_VPS_USER }}
          VPS_HOST: ${{ secrets.GEEF_VPS_HOST }}
          VPS_PATH: ${{ secrets.GEEF_VPS_PATH }}
        run: |
          echo "🎯 Deployment target"
          echo "Host: $VPS_HOST"
          echo "User: $VPS_USER"
          echo "Path: $VPS_PATH"

      - name: Deploy to VPS (Attempt ${{ matrix.attempt }})
        id: deploy
        env:
          VPS_USER: ${{ secrets.GEEF_VPS_USER }}
          VPS_HOST: ${{ secrets.GEEF_VPS_HOST }}
          VPS_PATH: ${{ secrets.GEEF_VPS_PATH }}
        run: |
          echo "🚀 Deploying to VPS (Attempt ${{ matrix.attempt }}/3)..."
          ssh -i ~/.ssh/id_rsa \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" \
            "cd $VPS_PATH && bash deploy.sh" 2>&1 | tee deploy.log

          if [ $? -eq 0 ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed"
            exit 1
          fi

      - name: Save Deploy Logs
        if: always()
        run: |
          mkdir -p deploy-logs
          cp deploy.log deploy-logs/attempt-${{ matrix.attempt }}.log || true

      - name: Upload Deploy Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs
          path: deploy-logs/
          retention-days: 7

      - name: Verify Deployment
        if: success()
        run: |
          echo "✅ Verifying deployment..."
          sleep 5

          curl -s -o /dev/null -w "%{http_code}" https://geef.com.br || \
          curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.VPS_HOST }}:3500 || \
          echo "⚠️ Health check skipped (no external access)"

      - name: Retry on Failure
        if: failure() && matrix.attempt < 3
        run: |
          echo "⚠️ Deployment attempt ${{ matrix.attempt }} failed"
          echo "Waiting before retry..."
          sleep 15

      - name: Fail on Final Attempt
        if: failure() && matrix.attempt == 3
        run: |
          echo "❌ Deployment failed after 3 attempts"
          echo "Please check logs and fix the issue"
          exit 1

  # NOTIFICAÇÃO FINAL
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [validate, pre-deploy-check, deploy]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "📊 WORKFLOW SUMMARY"
          echo "===================="
          echo "Validation: ${{ needs.validate.result }}"
          echo "Pre-Deploy: ${{ needs.pre-deploy-check.result }}"
          echo "Deploy: ${{ needs.deploy.result }}"
          echo ""

          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ DEPLOYMENT SUCCESSFUL"
            echo "🌐 Site: https://geef.com.br"
          else
            echo "❌ DEPLOYMENT FAILED"
            echo "📋 Check GitHub Actions logs for details"
            echo "🔍 Download build-logs and deploy-logs artifacts"
          fi
