name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GEEF_VPS_SSH_KEY }}

      - name: Normalize remote ownership
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes \
            "${{ secrets.GEEF_VPS_USER }}@${{ secrets.GEEF_VPS_HOST }}" <<'EOF'
          set -e
          sudo chown -R "${{ secrets.GEEF_VPS_USER }}:${{ secrets.GEEF_VPS_USER }}" "${{ secrets.GEEF_VPS_PATH }}"
          EOF

      - name: Sync files
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.next' \
            --exclude '.secrets' \
            --exclude 'node_modules' \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes" \
            ./ "${{ secrets.GEEF_VPS_USER }}@${{ secrets.GEEF_VPS_HOST }}:${{ secrets.GEEF_VPS_PATH }}/"

      - name: Restart app
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes \
            "${{ secrets.GEEF_VPS_USER }}@${{ secrets.GEEF_VPS_HOST }}" <<'EOF'
          set -e
          cd "${{ secrets.GEEF_VPS_PATH }}"
          npm ci
          npm run build
          sudo systemctl restart sitegeef
          EOF
