name: Build and Validate

on:
  push:
    branches:
      - main

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply Supabase Migrations
        run: |
          echo "Note: Migrations in supabase/migrations/ are auto-applied by Supabase GitHub integration"
          echo "If configured, Supabase will detect changes in supabase/migrations/"
        continue-on-error: true

      - name: Build
        run: npm run build
